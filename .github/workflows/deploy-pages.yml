name: Deploy MLB Picks to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "picks/**"          # only redeploy when picks change
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site folder
        run: |
          mkdir -p _site
          # Latest picks → index.html (the bookmarkable root URL)
          cp picks/mlb_picks_latest.html _site/index.html
          # Keep dated files accessible too
          cp picks/mlb_picks_*.html _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
